info:
  name: Get Device Info
  type: http
  seq: 5

http:
  method: POST
  url: "{{base_url}}/AppInterfaceServer/Config/GetDeviceInfo"
  body:
    type: json
    data: '{"DeviceCode":"{{device_codes[0]}}"}'
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
