info:
  name: Get Device List
  type: http
  seq: 5

http:
  method: POST
  url: "{{base_url}}/AppInterfaceServer/Config/GetDeviceList"
  body:
    type: json
    data: |-
      {
        "StationCode": "{{station_codes[0]}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.deleteEnvVar("device_codes");
        if (res.status == 200) {
          // Extract data from the response body
          let data = res.getBody();

          // 0 is failure, 1 is success
          if (data.Code == 1) {
            const codes = data.Data.map(device => device.DeviceCode);
            bru.setVar("device_codes", codes);
          }
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
