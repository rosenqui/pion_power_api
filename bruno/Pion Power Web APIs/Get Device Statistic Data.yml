  type: http
  seq: 10

http:
  method: POST
  url: "{{base_url}}/StatisticsDataServer/Statistics/GetDeviceStatisticData"
  body:
    type: json
    data: '{"DeviceCode":"{{device_codes[0]}}"}'
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

