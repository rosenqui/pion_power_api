info:
  name: Get Pile Parameter
  type: http
  seq: 11

http:
  method: POST
  url: "{{base_url}}/ToCWebInterfaceServer/Config/GetPileParameter"
  body:
    type: json
    data: '{"DeviceCode":"{{device_codes[0]}}"}'
  auth: inherit

runtime:
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res('Data.MaximumCurrent')
        method: jsonq
      variable:
        name: PileParamMaximumCurrent
        scope: runtime
    - type: set-variable
      phase: after-response
      selector:
        expression: res('Data.ChargeCurrent')
        method: jsonq
      variable:
        name: PileParamChargeCurrent
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Sample pile parameter
    request:
      url: "{{base_url}}/ToCWebInterfaceServer/Config/GetPileParameter"
      method: POST
      body:
        type: json
        data: '{"DeviceCode":"{{device_codes[0]}}"}'
