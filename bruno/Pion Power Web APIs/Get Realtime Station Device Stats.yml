info:
  name: Get Realtime Station Device Stats
  type: http
  seq: 6

http:
  method: POST
  url: "{{base_url}}/ToCWebInterfaceServer/Real/GetStationDeviceReals"
  body:
    type: json
    data: |-
      {
        "StationCode": "{{station_codes[0]}}",
        "dontUseSignalIdDic": {
          "102": [
            10200000,
            10200001,
            10200002,
            10200003,
            10200006,
            10210000,
            10220000,
            10230000
          ],
          "201": [
            20100000,
            20100109,
            20100207,
            20100213,
            20100201,
            20100003
          ],
          "202": [
            20200000,
            20200008,
            20200003,
            20200004,
            20200009
          ],
          "301": [
            30100000,
            30100109,
            30100502,
            30100126,
            30100507,
            30100504,
            30100510,
            30100513,
            30100003
          ],
          "901": [
            90100000,
            90100002,
            90100006,
            90100306,
            90100206,
            90100300,
            90100209,
            90100217
          ]
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.deleteEnvVar("device_codes");
        if (res.status == 200) {
          // Extract data from the response body
          let data = res.getBody();

          // 0 is failure, 1 is success
          if (data.Code == 1) {
            const codes = data.Data.DeviceReals.map(device => device.DeviceCode);
            bru.setVar("device_codes", codes);
          }
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
