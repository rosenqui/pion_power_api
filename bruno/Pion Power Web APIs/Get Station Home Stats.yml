info:
  name: Get Station Home Stats
  type: http
  seq: 8

http:
  method: POST
  url: "{{base_url}}/ToCWebInterfaceServer/Statistic/GetStationHomeStatData"
  body:
    type: json
    data: |-
      {
        "NowTime": "{{$isoTimestamp}}", // Browser sends just YYYY-MM-DD. API doesn't seem to use it
        "StationCode": "{{station_codes[0]}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: While charging
