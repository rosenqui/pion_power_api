info:
  name: Get Station Info
  type: http
  seq: 4

http:
  method: POST
  url: "{{base_url}}/AppInterfaceServer/Config/GetStationInfo"
  body:
    type: json
    data: |-
      {
        "StationCode": "{{station_codes[0]}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
