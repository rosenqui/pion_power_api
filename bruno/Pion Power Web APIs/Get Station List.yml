info:
  name: Get Station List
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/AppInterfaceServer/Config/GetStationList"
  body:
    type: json
    data: "{}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.deleteEnvVar("station_codes");
        if (res.status == 200) {
          // Extract data from the response body
          let data = res.getBody();

          // 0 is failure, 1 is success
          if (data.Code == 1) {
            const codes = data.Data.map(station => station.StationCode);
            bru.setVar("station_codes", codes);
          }
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Station List
    request:
      url: "{{base_url}}/AppInterfaceServer/Config/GetStationList"
      method: POST
      body:
        type: json
        data: "{}"
    response:
      status: 200
      statusText: OK
      headers:
        - name: server
          value: nginx/1.21.5
        - name: date
          value: Sat, 02 May 2026 18:59:54 GMT
        - name: content-type
          value: application/json; charset=utf-8
        - name: transfer-encoding
          value: chunked
        - name: connection
          value: keep-alive
        - name: vary
          value: Accept-Encoding
      body:
        type: json
        data: |-
          {
            "Code": 1,
            "Msg": "Success",
            "Data": [
              {
                "StationCode": "123456789012345678",
                "StationName": "Example Station Name",
                "StationType": 4,
                "IsDefaultStation": true,
                "AuthType": 1,
                "MemberCount": 0,
                "DeviceCount": 0,
                "Country": "",
                "Province": "",
                "City": "",
                "Area": ""
              }
            ]
          }
