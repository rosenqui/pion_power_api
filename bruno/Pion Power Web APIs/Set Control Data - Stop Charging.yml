info:
  name: Set Control Data - Stop Charging
  type: http
  seq: 13

http:
  method: POST
  url: "{{base_url}}/ControlDataServer/ControlData/SetControlData"
  body:
    type: json
    data: |-
      {
        "controlSend": [
          {
            "deviceCode": "{{device_codes[0]}}",
            "controlValueType": 1,
            "signalId": "90100404",
            "controlLevel": 1,
            "signalValue": 1,
            "signalString": "{\"PileSn\":\"{{device_codes[0]}}\",\"Status\":1}"
          }
        ]
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const moment = require("moment");
        // Change the format string inside the quotes as needed
        const now = moment().format("YYYY-MM-DD HH:mm:ss"); 
        bru.setVar("formattedTimestamp", now);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Sample response
    request:
      url: "{{base_url}}/ControlDataServer/ControlData/SetControlData"
      method: POST
      body:
        type: json
        data: |-
          {
            "controlSend": [
              {
                "deviceCode": "{{device_codes[0]}}",
                "controlValueType": 1,
                "signalId": "90100404",
                "controlLevel": 1,
                "signalValue": 0,
                "signalString": "{\"PileSn\":\"{{device_codes[0]}}\",\"StartTime\":\"{{formattedTimestamp}}\",\"Duration\":24,\"Current\":32,\"Power\":7000,\"Status\":0}"
              }
            ]
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: server
          value: nginx/1.21.5
        - name: date
          value: Fri, 05 Jun 2026 16:07:15 GMT
        - name: content-type
          value: application/json; charset=utf-8
        - name: transfer-encoding
          value: chunked
        - name: connection
          value: keep-alive
        - name: vary
          value: Accept-Encoding
      body:
        type: json
        data: |-
          {
            "Code": 1,
            "Msg": "Success",
            "Data": true
          }
